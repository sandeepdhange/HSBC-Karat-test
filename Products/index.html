<html>
    <head>
        <style>
            #products-container {
                width: 100%;
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
            }
            .product {
                display: block;
                width: 300px;
                height: 300px;
                padding: 10px;
                border: 1px solid #ccc;
                margin: 2px;
            }
            .productDetails {
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: flex-start;
                flex-wrap: wrap;
            }
            #search {
                width: 100%;
                margin-bottom: 10px;
            }
            .hidden {
                display: none;
            }
        </style>
    </head>
    <body>
        <input type="text" id="search" placeholder="Search Products..." />
        <div id="products-container">
            
        </div>
        <script src="index.js"></script>
    </body>
</html>
